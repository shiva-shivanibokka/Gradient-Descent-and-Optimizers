services:
  # ── Training runner ───────────────────────────────────────────────────────
  # One-shot: runs a training experiment, logs to ./mlruns, then exits.
  #   docker compose run --rm train --config configs/adam_mnist.yaml
  train:
    build:
      context: .
      target: app
    volumes:
      - ./mlruns:/app/mlruns
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app/src
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # ── MLflow tracking server ────────────────────────────────────────────────
  # View experiment results at http://localhost:5000.
  #   docker compose --profile mlflow up mlflow
  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri /mlruns
               --default-artifact-root /mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped
    profiles:
      - mlflow
