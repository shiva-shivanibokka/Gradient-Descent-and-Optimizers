optimizer:
  name: momentum_sgd
  lr: 0.01
  momentum: 0.9

scheduler:
  name: none

train:
  dataset: mnist
  model: mlp
  epochs: 20
  batch_size: 64
  seed: 42
  grad_clip: null
  eval_every: 1
  early_stopping_patience: 5

mlflow:
  enabled: true
  experiment_name: optimizer-comparison-mnist
  run_name: momentum_sgd_lr0.01_b0.9

mlp:
  input_dim: 784
  hidden_dims: [256, 128]
  output_dim: 10
  dropout: 0.2
  activation: relu
  batch_norm: true
