# Scheduler comparison on CIFAR-10 with CNN
# Run multiple times changing only scheduler.name to compare schedules.
# Supported: none, step, cosine, onecycle, cyclical, warmup_cosine, reduce_on_plateau

optimizer:
  name: adamw
  lr: 0.001
  beta1: 0.9
  beta2: 0.999
  epsilon: 1.0e-8
  weight_decay: 0.01

scheduler:
  name: cosine          # change this to compare: step / onecycle / cyclical / warmup_cosine
  t_max: 30             # cosine: half-period
  step_size: 10         # step: epochs between reductions
  gamma: 0.1            # step / plateau: reduction factor
  pct_start: 0.3        # onecycle: warmup fraction
  max_lr: 0.01          # onecycle / cyclical: peak LR
  base_lr: 1.0e-4       # cyclical: minimum LR
  step_size_up: 4       # cyclical: epochs per half-cycle
  warmup_steps: 5       # warmup_cosine: warmup epochs
  patience: 5           # plateau: epochs before reducing
  eta_min: 1.0e-6       # cosine / warmup_cosine: floor LR

train:
  dataset: cifar10
  model: cnn
  epochs: 30
  batch_size: 128
  seed: 42
  grad_clip: 1.0
  eval_every: 1
  early_stopping_patience: 10

mlflow:
  enabled: true
  experiment_name: scheduler-comparison-cifar10
  run_name: adamw_cosine_cifar10

cnn:
  in_channels: 3
  num_classes: 10
  dropout: 0.3
